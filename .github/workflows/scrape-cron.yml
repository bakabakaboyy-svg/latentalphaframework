name: Scrape odds

# Replaces the originally-planned Railway cron service, which was never
# actually running — the shared Supabase database went ~7 hours without a
# single fresh scrape before this was added. GitHub Actions' practical floor
# for scheduled workflows is every 5 minutes (GitHub doesn't reliably honor
# shorter intervals, and may occasionally delay/skip a run under load), which
# is looser than the original 1-minute goal but is what's actually achievable
# for free without a Vercel Pro upgrade. workflow_dispatch lets this be run
# on demand from the Actions tab for a manual test.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/scrape
        run: |
          curl -sf -X POST "https://latentalphaframework.vercel.app/api/scrape" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --max-time 30
